<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Work Planner</title>

<meta name="description" content="Plan your workday by calculating half-day and end-of-day timings based on configurable work hours.">

<meta property="og:title" content="Daily Work Planner">
<meta property="og:description" content="Plan your workday by calculating half-day and end-of-day timings based on configurable work hours.">
<meta property="og:image" content="https://nijusvision45.github.io/Daily-Work-Planner/preview.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nijusvision45.github.io/Daily-Work-Planner/">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Daily Work Planner">
<meta name="twitter:description" content="Plan your workday by calculating half-day and end-of-day timings based on configurable work hours.">
<meta name="twitter:image" content="https://nijusvision45.github.io/Daily-Work-Planner/preview.png">
    
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:url('late.png') no-repeat center center fixed;
    background-size:cover;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:all 0.8s ease;
}

.container{
    width:600px;
    background:rgba(255,255,255,0.93);
    padding:35px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:15px;
}

.subtitle{
    margin-bottom:25px;
    color:#555;
    line-height:1.8;
}

.config-box{
    background:#f4f4f4;
    padding:15px;
    border-radius:10px;
    margin-bottom:25px;
}

.config-box h3{
    margin-bottom:10px;
}

.config-box input{
    width:100px;
}

.time-input{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
}

input,
select{
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
    text-align:center;
}

button{
    background:#0078d4;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#005fa3;
}

.note{
    margin-top:10px;
    color:#666;
    font-size:14px;
}

#result{
    margin-top:25px;
    font-size:20px;
    font-weight:bold;
    line-height:1.8;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>
</head>

<body>

<div class="container">

    <h1>Hello User 👋</h1>

    <div class="subtitle">
        Ready to Leave the Office?
        <br><br>
        Please give the entry timing.
    </div>

    <div class="config-box">

        <h3>Configuration</h3>

        <label>
            Working Hours:
        </label>

        <input
            type="number"
            id="workingHours"
            value="8.5"
            step="0.5"
            min="0.5">

    </div>

    <div class="time-input">

        <input
            type="number"
            id="hour"
            placeholder="HH">

        <span>:</span>

        <input
            type="number"
            id="minute"
            placeholder="MM">

        <select id="ampm">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
        </select>

    </div>

    <button onclick="calculateTime()">
        Calculate
    </button>

    <div class="note">
        Please enter the timing in 12-hour format.
        <br>
        Example: 09:00 AM, 12:45 PM, 00:45 AM
        <br>
        Note: 00 is allowed only for AM.
    </div>

    <div id="result"></div>

</div>

<script>

function formatTime(dateObj){

    let hour = dateObj.getHours();
    let minute = String(dateObj.getMinutes()).padStart(2,"0");

    let ampm = hour >= 12 ? "PM" : "AM";

    hour = hour % 12;

    if(hour === 0){
        hour = 12;
    }

    return hour + ":" + minute + " " + ampm;
}

function showError(message){

    document.body.style.backgroundImage =
        "url('shout.png')";

    document.getElementById("result").innerHTML =
        "<span class='error'>❌ " + message + "</span>";
}

function calculateTime(){

    let hourInput =
        document.getElementById("hour").value.trim();

    let minuteInput =
        document.getElementById("minute").value.trim();

    let ampm =
        document.getElementById("ampm").value;

    let workingHours =
        Number(document.getElementById("workingHours").value);

    if(hourInput === "" || minuteInput === ""){
        showError("Please give the timing.");
        return;
    }

    if(isNaN(workingHours) || workingHours <= 0){
        showError("Please provide valid working hours.");
        return;
    }

    let hour = Number(hourInput);
    let minute = Number(minuteInput);

    if(isNaN(minute) || minute < 0 || minute > 59){
        showError("Please give a valid timing.");
        return;
    }

    if(ampm === "AM"){

        if(isNaN(hour) || hour < 0 || hour > 12){
            showError("Please give a valid timing.");
            return;
        }

    }else{

        if(isNaN(hour) || hour < 1 || hour > 12){
            showError("Please give a valid timing.");
            return;
        }
    }

    if(ampm === "AM"){

        if(hour === 0 || hour === 12){
            hour = 0;
        }

    }else{

        if(hour !== 12){
            hour += 12;
        }
    }

    let entryTime = new Date();

    entryTime.setHours(hour);
    entryTime.setMinutes(minute);
    entryTime.setSeconds(0);

    let halfDayTime = new Date(entryTime);

    halfDayTime.setMinutes(
        halfDayTime.getMinutes() +
        ((workingHours / 2) * 60)
    );

    let leaveTime = new Date(entryTime);

    leaveTime.setMinutes(
        leaveTime.getMinutes() +
        (workingHours * 60)
    );

    document.body.style.backgroundImage =
        "url('leave.png')";

    document.getElementById("result").innerHTML =
    `
    <span class="success">
        ✅ Half Day Time: ${formatTime(halfDayTime)}
        <br><br>
        ✅ Leave Time: ${formatTime(leaveTime)}
    </span>
    `;
}

</script>

</body>
</html>
