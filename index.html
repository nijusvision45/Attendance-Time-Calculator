<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Leave Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:url('late.png') no-repeat center center fixed;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    transition:all 0.8s ease;
}

.container{
    width:500px;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(5px);

    padding:35px;
    border-radius:15px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

h1{
    color:#222;
    margin-bottom:15px;
}

.subtitle{
    color:#555;
    margin-bottom:25px;
    line-height:1.7;
}

.time-input{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-bottom:25px;
}

input,
select{
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
    text-align:center;
}

input{
    width:80px;
}

button{
    background:#0078d4;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#005fa3;
}

.note{
    margin-top:12px;
    color:#666;
    font-size:14px;
    font-style:italic;
}

#result{
    margin-top:25px;
    font-size:22px;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>
</head>

<body>

<div class="container">

    <h1>Hello User 👋</h1>

    <div class="subtitle">
        Ready to leave the office?
        <br><br>
        Please give the entry timing.
    </div>

    <div class="time-input">

        <input
            type="number"
            id="hour"
            placeholder="HH">

        <span>:</span>

        <input
            type="number"
            id="minute"
            placeholder="MM">

        <select id="ampm">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
        </select>

    </div>

    <button onclick="calculateTime()">
        Calculate
    </button>

    <div class="note">
        Please enter the timing in 12-hour format.
    </div>

    <div id="result"></div>

</div>

<script>

function calculateTime(){

    let hourInput = document.getElementById("hour").value.trim();
    let minuteInput = document.getElementById("minute").value.trim();
    let ampm = document.getElementById("ampm").value;

    // Blank validation
    if(hourInput === "" || minuteInput === "")
    {
        document.body.style.backgroundImage = "url('shout.png')";
