<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Office Leave Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:url('late.png') no-repeat center center fixed;
    background-size:cover;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    transition:all 0.8s ease;
}

.container{
    background:rgba(255,255,255,0.93);
    padding:35px;
    border-radius:15px;
    width:550px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:15px;
}

.subtitle{
    color:#555;
    margin-bottom:25px;
    line-height:1.8;
}

.time-input{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
}

input,select{
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
    text-align:center;
}

input{
    width:80px;
}

button{
    background:#0078d4;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#005fa3;
}

.note{
    margin-top:10px;
    color:#666;
    font-size:14px;
}

#result{
    margin-top:25px;
    font-size:20px;
    font-weight:bold;
    line-height:1.8;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>
</head>

<body>

<div class="container">

    <h1>Hello User 👋</h1>

    <div class="subtitle">
        Ready to Leave the Office?
        <br><br>
        Please give the entry timing.
    </div>

    <div class="time-input">

        <input type="number" id="hour" placeholder="HH">

        <span>:</span>

        <input type="number" id="minute" placeholder="MM">

        <select id="ampm">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
        </select>

    </div>

    <button onclick="calculateTime()">
        Calculate
    </button>

    <div class="note">
        Please enter the timing in 12-hour format.<br>
        Example: 09:00 AM, 12:45 PM, 00:45 AM<br>
        Note: 00 is allowed only for AM.
    </div>

    <div id="result"></div>

</div>

<script>

const WORKING_HOURS = 8.5;

function formatTime(dateObj){

    let hours = dateObj.getHours();
    let minutes = String(dateObj.getMinutes()).padStart(2,"0");

    let ampm = hours >= 12 ? "PM" : "AM";

    hours = hours % 12;

    if(hours === 0){
        hours = 12;
    }

    return hours + ":" + minutes + " " + ampm;
}

function showError(message){

    document.body.style.backgroundImage =
        "url('shout.png')";

    document.getElementById("result").innerHTML =
        "<span class='error'>❌ " + message + "</span>";
}

function calculateTime(){

    let hourText =
        document.getElementById("hour").value.trim();

    let minuteText =
        document.getElementById("minute").value.trim();

    let ampm =
        document.getElementById("ampm").value;

    if(hourText === "" || minuteText === ""){
        showError("Please give the timing.");
        return;
    }

    let hour = Number(hourText);
    let minute = Number(minuteText);

    if(isNaN(minute) || minute < 0 || minute > 59){
        showError("Please give a valid timing.");
        return;
    }

    if(ampm === "AM"){

        if(isNaN(hour) || hour < 0 || hour > 12){
            showError("Please give a valid timing.");
            return;
        }

    }else{

        if(isNaN(hour) || hour < 1 || hour > 12){
            showError("Please give a valid timing.");
            return;
        }
    }

    // Convert to 24-hour clock

    if(ampm === "AM"){

        if(hour === 0 || hour === 12){
            hour = 0;
        }

    }else{

        if(hour !== 12){
            hour += 12;
        }
    }

    let entryTime = new Date();

    entryTime.setHours(hour);
    entryTime.setMinutes(minute);
    entryTime.setSeconds(0);

    let halfDayTime = new Date(entryTime);
    halfDayTime.setMinutes(
        halfDayTime.getMinutes() +
        ((WORKING_HOURS / 2) * 60)
    );

    let fullDayTime = new Date(entryTime);
    fullDayTime.setMinutes(
        fullDayTime.getMinutes() +
        (WORKING_HOURS * 60)
    );

    document.body.style.backgroundImage =
        "url('leave.png')";

    document.getElementById("result").innerHTML =
    `
    <span class="success">
        ✅ Half Day Time: ${formatTime(halfDayTime)}
        <br><br>
        ✅ You can leave the office by: ${formatTime(fullDayTime)}
    </span>
    `;
}

</script>

</body>
</html>
