<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Leave Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:url('late.png') no-repeat center center fixed;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    transition:all 0.8s ease;
}

.container{
    width:450px;

    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(6px);

    padding:35px;
    border-radius:15px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

h1{
    color:#222;
    margin-bottom:10px;
}

.subtitle{
    color:#555;
    margin-bottom:25px;
}

.time-input{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-bottom:25px;
}

input,
select{
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
    text-align:center;
}

input{
    width:80px;
}

button{
    background:#0078d4;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#005fa3;
}

#result{
    margin-top:25px;
    font-size:22px;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>
</head>

<body>

<div class="container">

    <h1>Hello User 👋</h1>

    <div class="subtitle">
        Ready to leave the office?
    </div>

    <div class="time-input">

        <input
            type="number"
            id="hour"
            min="1"
            max="12"
            placeholder="HH">

        <span>:</span>

        <input
            type="number"
            id="minute"
            min="0"
            max="59"
            placeholder="MM">

        <select id="ampm">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
        </select>

    </div>

    <button onclick="calculateTime()">
        Calculate
    </button>

    <div id="result"></div>

</div>

<script>

function calculateTime(){

    let hourField = document.getElementById("hour");
    let minuteField = document.getElementById("minute");

    let hour = hourField.value;
    let minute = minuteField.value;
    let ampm = document.getElementById("ampm").value;

    // Blank field validation
    if(hour === "" || minute === "")
    {
        document.body.style.backgroundImage =
            "url('shout.png')";

        document.getElementById("result").innerHTML =
            "<span class='error'>❌ Please give the timing.</span>";

        return;
    }

    hour = parseInt(hour);
    minute = parseInt(minute);

    if(
        hour < 1 ||
        hour > 12 ||
        minute < 0 ||
        minute > 59
    )
    {
        document.body.style.backgroundImage =
            "url('shout.png')";

        document.getElementById("result").innerHTML =
            "<span class='error'>❌ Please give a valid timing.</span>";

        return;
    }

    // Convert to 24-hour clock

    if(ampm === "PM" && hour !== 12)
    {
        hour += 12;
    }

    if(ampm === "AM" && hour === 12)
    {
        hour = 0;
    }

    let time = new Date();

    time.setHours(hour);
    time.setMinutes(minute);

    // Add 8 hours 30 minutes
    time.setMinutes(time.getMinutes() + 510);

    let leaveHour = time.getHours();
    let leaveMinute = String(time.getMinutes()).padStart(2,"0");

    let leaveAMPM =
        leaveHour >= 12 ? "PM" : "AM";

    leaveHour = leaveHour % 12;

    if(leaveHour === 0)
    {
        leaveHour = 12;
    }

    // Success image
    document.body.style.backgroundImage =
        "url('leave.png')";

    document.getElementById("result").innerHTML =
        "<span class='success'>✅ You can leave the office by<br><br>"
        + leaveHour + ":" + leaveMinute + " "
        + leaveAMPM +
        "</span>";
}

</script>

</body>
</html>
